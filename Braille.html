<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Braille Interactivo</title>
    <link rel="stylesheet" href="Braille.css">
</head>
<body>

<!-- BOTÓN HAMBURGUESA -->
<button id="toggleMenu" class="menu-btn">☰</button>

<!-- MENÚ -->
<div id="menu" class="menu">
    <h2>Opciones</h2>

    <div class="control">
        <label>Zoom</label>
        <div class="zoom-buttons">
            <button id="menos">−</button>
            <button id="mas">+</button>
        </div>
    </div>

    <div class="control">
        <label>Texto</label>
        <input type="text" id="texto" placeholder="Escribe una palabra">
        <button id="convertir">Convertir</button>
    </div>
</div>

<!-- FONDO OSCURO AL ABRIR -->
<div id="overlay"></div>

<!-- CONTENIDO -->
<div class="container">
    <h1>Braille</h1>
    <div class="braille" id="braille"></div>
</div>

<script src="Braille.js"></script>
</body>
</html>
