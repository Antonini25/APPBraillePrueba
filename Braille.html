<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Braille Interactivo</title>
    <link rel="stylesheet" href="Braille.css">
</head>
<body>

<div class="container">

    <h1 id="titulo">Braille</h1>

    <!-- Entrada de texto -->
    <div class="input-area">
        <input type="text" id="texto" placeholder="Escribe una palabra">
        <button id="convertir">Convertir</button>
    </div>

    <!-- Contenedor relativo -->
    <div class="braille-container">

        <!-- Botones flotantes -->
        <div class="controls">
            <button id="menos">−</button>
            <button id="mas">+</button>
        </div>

        <!-- Braille dinámico -->
        <div class="braille" id="braille"></div>

    </div>

</div>

<script src="Braille.js"></script>
</body>
</html>
