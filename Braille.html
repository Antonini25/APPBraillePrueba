<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Braille Interactivo</title>
    <link rel="stylesheet" href="Braille.css">
</head>
<body>

<!-- Botón menú -->
<button id="toggleMenu" class="menu-btn">☰</button>

<!-- Menú lateral -->
<div id="menu" class="menu">
    <h2>Opciones</h2>

    <div class="control">
        <label>Zoom</label><br>
        <button id="menos">−</button>
        <button id="mas">+</button>
    </div>

    <div class="control">
        <label>Texto</label><br>
        <input type="text" id="texto" placeholder="Escribe aquí">
        <button id="convertir">Convertir</button>
    </div>
</div>

<!-- Contenido -->
<div class="container">
    <h1>Braille</h1>
    <div class="braille" id="braille"></div>
</div>

<script src="Braille.js"></script>
</body>
</html>
